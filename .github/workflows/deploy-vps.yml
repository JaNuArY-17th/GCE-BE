name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Archive source for deployment
        run: |
          # Nếu repo đang thay đổi trong khi tar, sẽ không fail nếu file bị thay đổi
          tar --warning=no-file-changed --ignore-failed-read --exclude=node_modules --exclude=.git --exclude="deploy.tar.gz" -czf deploy.tar.gz .

      - name: Copy archive to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "deploy.tar.gz"
          target: ${{ secrets.VPS_TARGET_DIR }}

      - name: Deploy on VPS with Docker
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script: |
            set -e
            mkdir -p ${{ secrets.VPS_TARGET_DIR }}
            cd ${{ secrets.VPS_TARGET_DIR }}

            tar -xzf deploy.tar.gz

            cat > .env << 'EOF'
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF

            # Sử dụng Docker Compose để build + chạy container
            docker compose down || true
            docker compose build --no-cache
            docker compose up -d

            rm deploy.tar.gz
